<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" fill="none">
  <rect width="1600" height="1180" fill="#0B1020"/>

  <text x="72" y="74" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">
    DSO Dashboard Structure
  </text>
  <text x="72" y="108" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Business-first layout for multi-clinic dental operations
  </text>

  <rect x="56" y="140" width="1488" height="152" rx="22" fill="#111827" stroke="#1F2937"/>
  <text x="84" y="182" fill="#A3E635" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Section 1: Business Snapshot
  </text>

  <rect x="84" y="206" width="220" height="62" rx="16" fill="#172554"/>
  <text x="104" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Appointments Today</text>

  <rect x="322" y="206" width="220" height="62" rx="16" fill="#052E2B"/>
  <text x="342" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Confirmation Rate</text>

  <rect x="560" y="206" width="220" height="62" rx="16" fill="#1E293B"/>
  <text x="580" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Unconfirmed Next 24h</text>

  <rect x="798" y="206" width="220" height="62" rx="16" fill="#3F2A12"/>
  <text x="818" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Cancel / Reschedule</text>

  <rect x="1036" y="206" width="220" height="62" rx="16" fill="#2C1A4D"/>
  <text x="1056" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Open Chair Time</text>

  <rect x="1274" y="206" width="220" height="62" rx="16" fill="#3F1D2E"/>
  <text x="1294" y="244" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Clinics Needing Attention</text>

  <rect x="56" y="322" width="944" height="302" rx="22" fill="#111827" stroke="#1F2937"/>
  <text x="84" y="364" fill="#A3E635" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Section 2: Operations Insight
  </text>
  <rect x="84" y="392" width="428" height="200" rx="18" fill="#0F172A" stroke="#243042"/>
  <text x="108" y="430" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Confirmation Funnel</text>
  <text x="108" y="465" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">Scheduled</text>
  <rect x="108" y="480" width="336" height="18" rx="9" fill="#1E293B"/>
  <rect x="108" y="480" width="310" height="18" rx="9" fill="#3B82F6"/>
