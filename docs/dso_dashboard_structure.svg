  <rect x="536" y="392" width="436" height="200" rx="18" fill="#0F172A" stroke="#243042"/>
  <text x="560" y="430" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Clinic Comparison Chart</text>
  <line x1="572" y1="560" x2="940" y2="560" stroke="#334155" stroke-width="2"/>
  <rect x="600" y="490" width="44" height="70" rx="8" fill="#3B82F6"/>
  <rect x="676" y="455" width="44" height="105" rx="8" fill="#10B981"/>
  <rect x="752" y="510" width="44" height="50" rx="8" fill="#F59E0B"/>
  <rect x="828" y="470" width="44" height="90" rx="8" fill="#EF4444"/>
